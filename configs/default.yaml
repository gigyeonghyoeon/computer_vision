project:
  seed: 42
  device: cuda  # cuda | cpu

paths:
  raw_dir: data/raw
  processed_dir: data/processed
  frames_dir: data/processed/frames
  metadata_csv: data/processed/metadata.csv
  output_dir: outputs

preprocess:
  fps: 1
  image_size: 224
  imagenet_mean: [0.485, 0.456, 0.406]
  imagenet_std: [0.229, 0.224, 0.225]

split:
  train_ratio: 0.70
  val_ratio: 0.15
  test_ratio: 0.15
  # park / pedestrian CCTV only — UCF/KTH always train
  splittable_datasets:
    - park_normal
    - pedestrian_cctv

autoencoder:
  latent_dim: 128
  batch_size: 32
  lr: 0.001
  epochs: 50
  early_stop_patience: 10

patchcore:
  backbone: resnet18  # resnet18 | vit_b16
  coreset_ratio: 0.1
  k_neighbors: 9
  batch_size: 32

evaluation:
  aggregation: max  # max | percentile_95
  threshold_percentile: 95
