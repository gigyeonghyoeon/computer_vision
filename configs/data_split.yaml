# AI Hub CCTV 3종 — Train/Val/Test (영상 ID 단위)

# 본 프로젝트 핵심 데이터 (AI Hub)
datasets:
  anomaly:
    label: 1
    splittable: false
    aihub_sn: "이용신청 데이터셋"
    role: "CCTV 이상행동 — test only"
  pedestrian_cctv:
    label: 0
    splittable: true
    aihub_sn: 489
    name: "유동인구 분석을 위한 CCTV 영상 데이터"
    role: "상권 CCTV 정상 — train/val"
  park_normal:
    label: 0
    splittable: true
    aihub_sn: 477
    name: "공원 주요시설 및 불법행위 감시 CCTV (정상행위만)"
    role: "공원 CCTV 정상 — train/val/test"

# 선택 보조 (필수 아님)
optional:
  ucf101:
    label: 0
    splittable: false
    role: "일반 행동 학습 보조"
  kth:
    label: 0
    splittable: false
    role: "일반 행동 학습 보조"

ratios:
  train: 0.70
  val: 0.15
  test: 0.15

# train: pedestrian_cctv + park_normal (정상만)
# val:   holdout → threshold 95th percentile
# test:  park_normal (정상) + anomaly (이상)
